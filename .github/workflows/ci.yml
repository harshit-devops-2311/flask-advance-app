name: DevOps Testing CI

on:
  push:
    branches: [ master ]

jobs:
  DevOps:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v3

    - name: Setup Python
      uses: actions/setup-python@v4
      with:
        python-version: 3.12

    - name: Install Dependencies
      run: pip install -r requirements.txt

    - name: Run Tests (Fast Feedback)
      run: pytest -x
